# Clash Verge Universal Config (v2 - rule-providers)
# 通用版: include-all + filter 自动适配任何订阅
# 规则源: blackmatrix7 + Loyalsoldier (与 Clash-Full.ini 保持一致)
#
mixed-port: 7890
allow-lan: false
mode: rule
log-level: warning
ipv6: false
proxy-groups:
