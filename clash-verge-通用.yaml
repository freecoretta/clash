# Clash Verge Universal Config
# 通用版:使用 include-all + filter 自动适配任何订阅
# 地区组按节点名字自动筛选,换订阅/机场不用改配置
#
# 用法:
#   1. Verge → Profiles → 导入订阅(任意机场)
#   2. 把这个文件设为 merge 子模块 或 完整配置
#   3. 节点自动按名字匹配到对应地区组
#
mixed-port: 7890
allow-lan: false
mode: rule
log-level: warning
ipv6: false

proxy-groups:
  - name: 🔀 手动选择
    type: select
    proxies:
      - 🇭🇰 香港
      - 🇯🇵 日本
      - 🇰🇷 韩国
      - 🇹🇼 台湾
      - 🇸🇬 新加坡
      - 🇺🇸 美国
      - 🌏 台日
      - 🌏 马来越南
      - 🌏 台日新韩马
      - 🌍 其他地区
      - ⚡ 自动选择
      - 📂 默认
      - 🔍 Google YouTube
      - 🤖 ChatGPT Gemini
      - 📱 WhatsApp Telegram
      - 💼 LinkedIn
      - 🎵 TikTok
      - DIRECT

  - name: 📂 默认
    type: select
    proxies:
      - 🇭🇰 香港
      - 🇯🇵 日本
      - 🇰🇷 韩国
      - 🇹🇼 台湾
      - 🇸🇬 新加坡
      - 🇺🇸 美国
      - 🌏 台日
      - 🌏 马来越南
      - 🌏 台日新韩马
      - 🌍 其他地区
      - ⚡ 自动选择

  - name: 🤖 ChatGPT Gemini
    type: select
    proxies:
      - 🇭🇰 香港
      - 🇯🇵 日本
      - 🇰🇷 韩国
      - 🇹🇼 台湾
      - 🇸🇬 新加坡
      - 🇺🇸 美国
      - 🌏 台日
      - 🌏 马来越南
      - 🌏 台日新韩马
      - 🌍 其他地区
      - ⚡ 自动选择

  - name: 📱 WhatsApp Telegram
    type: select
    proxies:
      - 🇭🇰 香港
      - 🇯🇵 日本
      - 🇰🇷 韩国
      - 🇹🇼 台湾
      - 🇸🇬 新加坡
      - 🇺🇸 美国
      - 🌏 台日
      - 🌏 马来越南
      - 🌏 台日新韩马
      - 🌍 其他地区
      - ⚡ 自动选择

  - name: 💼 LinkedIn
    type: select
    proxies:
      - 🇭🇰 香港
      - 🇯🇵 日本
      - 🇰🇷 韩国
      - 🇹🇼 台湾
      - 🇸🇬 新加坡
      - 🇺🇸 美国
      - 🌏 台日
      - 🌏 马来越南
      - 🌏 台日新韩马
      - 🌍 其他地区
      - ⚡ 自动选择

  - name: 🔍 Google YouTube
    type: select
    proxies:
      - 🇭🇰 香港
      - 🇯🇵 日本
      - 🇰🇷 韩国
      - 🇹🇼 台湾
      - 🇸🇬 新加坡
      - 🇺🇸 美国
      - 🌏 台日
      - 🌏 马来越南
      - 🌏 台日新韩马
      - 🌍 其他地区
      - ⚡ 自动选择

  - name: 🎵 TikTok
    type: select
    proxies:
      - 🇭🇰 香港
      - 🇯🇵 日本
      - 🇰🇷 韩国
      - 🇹🇼 台湾
      - 🇸🇬 新加坡
      - 🇺🇸 美国
      - 🌏 台日
      - 🌏 马来越南
      - 🌏 台日新韩马
      - 🌍 其他地区
      - ⚡ 自动选择

  # ===== 自动选择(全节点中选最快) =====
  - name: ⚡ 自动选择
    type: url-test
    include-all: true
    exclude-type: direct
    url: http://www.gstatic.com/generate_204
    interval: 300
    tolerance: 50

  # ===== 地区组(自动适配任何订阅) =====
  - name: 🇭🇰 香港
    type: url-test
    include-all: true
    exclude-type: direct
    filter: "(?i)港|hk|hongkong|hong kong"
    url: http://www.gstatic.com/generate_204
    interval: 300
    tolerance: 50

  - name: 🇯🇵 日本
    type: url-test
    include-all: true
    exclude-type: direct
    filter: "(?i)日|jp|japan"
    url: http://www.gstatic.com/generate_204
    interval: 300
    tolerance: 50

  - name: 🇰🇷 韩国
    type: url-test
    include-all: true
    exclude-type: direct
    filter: "(?i)韩|kr|korea"
    url: http://www.gstatic.com/generate_204
    interval: 300
    tolerance: 50

  - name: 🇹🇼 台湾
    type: url-test
    include-all: true
    exclude-type: direct
    filter: "(?i)台|tw|taiwan"
    url: http://www.gstatic.com/generate_204
    interval: 300
    tolerance: 50

  - name: 🇸🇬 新加坡
    type: url-test
    include-all: true
    exclude-type: direct
    filter: "(?i)(新|sg|singapore)"
    url: http://www.gstatic.com/generate_204
    interval: 300
    tolerance: 50

  - name: 🇺🇸 美国
    type: url-test
    include-all: true
    exclude-type: direct
    filter: "(?i)美|us|unitedstates|united states"
    url: http://www.gstatic.com/generate_204
    interval: 300
    tolerance: 50

  - name: 🌏 台日
    type: url-test
    include-all: true
    exclude-type: direct
    filter: "(?i)(台|tw|taiwan|日|jp|japan)"
    url: http://www.gstatic.com/generate_204
    interval: 300
    tolerance: 50

  - name: 🌏 马来越南
    type: url-test
    include-all: true
    exclude-type: direct
    filter: "(?i)(越|vn|vietnam|马|malaysia|malay)"
    url: http://www.gstatic.com/generate_204
    interval: 300
    tolerance: 50

  - name: 🌏 台日新韩马
    type: url-test
    include-all: true
    exclude-type: direct
    filter: "(?i)(台|tw|taiwan|日|jp|japan|新|sg|singapore|韩|kr|korea|马|malaysia|malay)"
    url: http://www.gstatic.com/generate_204
    interval: 300
    tolerance: 50

  - name: 🌍 其他地区
    type: url-test
    include-all: true
    exclude-type: direct
    filter: "(?i)^(?!.*(?:🇭🇰|🇯🇵|🇺🇸|🇸🇬|🇨🇳|港|hk|hongkong|台|tw|taiwan|日|jp|japan|新|sg|singapore|美|us|unitedstates|united states|韩|kr|korea|马|malaysia|malay|越|vn|vietnam)).*"
    url: http://www.gstatic.com/generate_204
    interval: 300
    tolerance: 50

