- name: ⚡ 自动选择
  type: url-test
  include-all: true
  exclude-type: direct
  url: http://www.gstatic.com/generate_204
  interval: 300
  tolerance: 50
- name: 🇭🇰 香港
  type: url-test
  include-all: true
  exclude-type: direct
  filter: (?i)(港|hk|hongkong|hong kong)
  url: http://www.gstatic.com/generate_204
  interval: 300
  tolerance: 50
- name: 🇯🇵 日本
  type: url-test
  include-all: true
  exclude-type: direct
  filter: (?i)(日|jp|japan)
  url: http://www.gstatic.com/generate_204
  interval: 300
  tolerance: 50
- name: 🇰🇷 韩国
  type: url-test
  include-all: true
  exclude-type: direct
  filter: (?i)(韩|kr|korea)
  url: http://www.gstatic.com/generate_204
  interval: 300
  tolerance: 50
- name: 🇹🇼 台湾
  type: url-test
  include-all: true
  exclude-type: direct
  filter: (?i)(台|tw|taiwan)
  url: http://www.gstatic.com/generate_204
  interval: 300
  tolerance: 50
- name: 🇸🇬 新加坡
  type: url-test
  include-all: true
  exclude-type: direct
  filter: (?i)(新|sg|singapore)
  url: http://www.gstatic.com/generate_204
  interval: 300
  tolerance: 50
- name: 🇺🇸 美国
  type: url-test
  include-all: true
  exclude-type: direct
  filter: (?i)(美|us|unitedstates|united states)
  url: http://www.gstatic.com/generate_204
  interval: 300
  tolerance: 50
- name: 🌏 台日
  type: url-test
  include-all: true
  exclude-type: direct
  filter: (?i)(台|tw|taiwan|日|jp|japan)
  url: http://www.gstatic.com/generate_204
  interval: 300
  tolerance: 50
- name: 🌏 马来越南
  type: url-test
  include-all: true
  exclude-type: direct
  filter: (?i)(越|vn|vietnam|马|malaysia|malay)
  url: http://www.gstatic.com/generate_204
  interval: 300
  tolerance: 50
- name: 🌏 台日新韩马
  type: url-test
  include-all: true
  exclude-type: direct
  filter: (?i)(台|tw|taiwan|日|jp|japan|新|sg|singapore|韩|kr|korea|马|malaysia|malay)
  url: http://www.gstatic.com/generate_204
  interval: 300
  tolerance: 50
- name: 🌍 其他地区
  type: url-test
  include-all: true
  exclude-type: direct
  filter: (?i)^(?!.*(?:港|hk|hongkong|台|tw|taiwan|日|jp|japan|新|sg|singapore|美|us|unitedstates|united states|韩|kr|korea|马|malaysia|malay|越|vn|vietnam)).*
  url: http://www.gstatic.com/generate_204
  interval: 300
  tolerance: 50
